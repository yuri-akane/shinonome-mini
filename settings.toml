# settings.toml – configuration for Shinonome Mini ver1.35

[scratch]
side="left" #"left" or "right"

# キーマッピング
[keys]
# 左スクラッチ（SP時左）
scratch_SP_left   = [" ", "a", "\t"]
# 右スクラッチ（SP時右）
scratch_SP_right  = ["b", "g", " "]
lane0          = "z"
lane1          = "s"
lane2          = "x"
lane3          = "d"
lane4          = "c"
lane5          = "f"
lane6          = "v"
lane7          = ","
lane8          = "l"
lane9          = "."
lane10         = ";"
lane11         = "/"
lane12         = ":"
# \（バックスラッシュや円記号）はエスケープして\\としてください。（\tや\nと同様です）
lane13         = "\\"
# 左スクラッチ（DP時左）
scratch_DP_left   = [" ", "a", "\t"]
# 右スクラッチ（DP時右）
scratch_DP_right  = ["[","]", "\n"]

# プレイオプション (各モードは bool で切り替え)
[play_options]
autoplay      = true   # 自動プレイ
mirror        = false  # ミラーモード (レーン反転)
random        = false  # ランダムノート配置
auto_scratch  = false  # オートスクラッチ (自動 Scratch)
easy_mode     = false  # イージーモード (ゲージ増減抑制/判定緩和)
show_measure_lines = true # 小節線の表示ON/OFF
hispeed = 1.2

# quit key configuration
[quit]
key = "esc"
#key = "q"

# 判定位置・タイミング調整の設定
[judgement]
judgement_y = 20          # 判定ラインの画面行位置（デフォルト: 16）
judgement_offset_ms = 0   # 判定タイミングのオフセット（ミリ秒、正の値で判定ライン到達より遅れて判定）
